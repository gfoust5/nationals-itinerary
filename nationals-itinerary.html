<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nationals Week — Zenith Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --onyx:       #0d0d0d;
    --onyx-soft:  #111111;
    --card-bg:    #161616;
    --mid:        #1e1e1e;
    --border:     #2a2626;
    --slate:      #5A5554;
    --slate-lt:   #8a8180;
    --champagne:  #AE9465;
    --amber:      #E7D19D;
    --midnight:   #30586E;
    --midnight-lt:#5a8ba8;
    --white:      #FFFFFF;
    --offwhite:   #F0EBE3;
    --compete-r:  #8B3A2A;
    --compete-rl: #C46A56;
    --personal-g: #3D5C4A;
    --personal-gl:#6B9478;
  }
  body { background: var(--onyx); color: var(--offwhite); font-family: 'Josefin Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  .app { min-height: 100vh; }

  /* SIDEBAR */
.sidebar-logo { display: flex; align-items: center; padding-bottom: 2px; }
.divider { height: 1px; background: var(--border); flex-shrink: 0; }
.field-group { display: flex; flex-direction: column; gap: 11px; }
.field label { font-size: 9px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--slate); }
.field input:focus { border-color: var(--champagne); }
.update-btn { background: var(--champagne); color: var(--onyx); border: none; border-radius: 5px; padding: 10px 20px; font-family: 'Josefin Sans', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; }
.update-btn:active { transform: scale(0.98); }
.sidebar::-webkit-scrollbar { width: 3px; }
/* MAIN */
  .main { max-width: 820px; margin: 0 auto; padding: 44px 40px 80px; }
  .main-header { margin-bottom: 44px; animation: fadeUp 0.5s ease both; border-bottom: 1px solid var(--border); padding-bottom: 30px; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .header-logo-block { display: flex; flex-direction: column; gap: 14px; }
  .header-logo img { height: 48px; filter: invert(1) brightness(0.82) sepia(0.45) saturate(2.2) hue-rotate(4deg) brightness(1.1); }
  .header-eyebrow { font-size: 9px; font-weight: 400; letter-spacing: 0.42em; text-transform: uppercase; color: var(--champagne); display: flex; align-items: center; gap: 10px; }
  .header-eyebrow::after { content: ''; display: block; height: 1px; width: 36px; background: var(--champagne); opacity: 0.35; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-bottom: 4px; }
  .header-pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .pill { font-size: 9px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--slate-lt); border: 1px solid var(--border); padding: 5px 12px; border-radius: 100px; }

  /* TIMELINE */
  .days { display: flex; flex-direction: column; }
  .day-row { display: grid; grid-template-columns: 46px 1fr; gap: 0 16px; animation: fadeUp 0.4s ease both; }
  .day-row:nth-child(1) { animation-delay: 0.06s; }
  .day-row:nth-child(2) { animation-delay: 0.12s; }
  .day-row:nth-child(3) { animation-delay: 0.18s; }
  .day-row:nth-child(4) { animation-delay: 0.24s; }
  .day-row:nth-child(5) { animation-delay: 0.30s; }
  .day-row:nth-child(6) { animation-delay: 0.36s; }
  .day-row:nth-child(7) { animation-delay: 0.42s; }
  .timeline-col { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
  .t-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .t-line { width: 1px; flex: 1; min-height: 16px; background: linear-gradient(to bottom, var(--border) 60%, transparent); margin-top: 5px; }
  .day-row:last-child .t-line { display: none; }
  .dot-work     { background: var(--champagne); box-shadow: 0 0 7px rgba(174,148,101,0.55); }
  .dot-travel   { background: var(--midnight);  box-shadow: 0 0 7px rgba(48,88,110,0.65); }
  .dot-compete  { background: var(--compete-r); box-shadow: 0 0 10px rgba(139,58,42,0.75); }
  .dot-personal { background: var(--personal-g);box-shadow: 0 0 7px rgba(61,92,74,0.55); }

  /* CARD */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-left: 2px solid transparent; border-radius: 8px; padding: 16px 20px; margin-bottom: 14px; cursor: pointer; transition: background 0.2s, transform 0.15s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(174,148,101,0.1), transparent); pointer-events: none; }
  .card:hover { background: #1a1a1a; }
  .type-work     { border-left-color: var(--champagne) !important; }
  .type-travel   { border-left-color: var(--midnight) !important; }
  .type-compete  { border-left-color: var(--compete-r) !important; }
  .type-personal { border-left-color: var(--personal-g) !important; }
  .card-summary { display: flex; align-items: center; justify-content: space-between; gap: 12px; user-select: none; }
  .card-day-label { font-size: 9px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--slate); margin-bottom: 5px; }
  .card-title { font-family: 'Josefin Sans', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--white); line-height: 1; }
  .summary-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .badge { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
  .badge-work     { background: rgba(174,148,101,0.1); color: var(--amber); border: 1px solid rgba(174,148,101,0.22); }
  .badge-travel   { background: rgba(48,88,110,0.12);  color: var(--midnight-lt); border: 1px solid rgba(48,88,110,0.28); }
  .badge-compete  { background: rgba(139,58,42,0.12);  color: var(--compete-rl); border: 1px solid rgba(139,58,42,0.28); }
  .badge-personal { background: rgba(61,92,74,0.12);   color: var(--personal-gl); border: 1px solid rgba(61,92,74,0.28); }
  .summary-peek { font-size: 10px; font-weight: 300; letter-spacing: 0.04em; color: var(--slate); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; transition: opacity 0.2s; }
  .card.open .summary-peek { opacity: 0; pointer-events: none; }
  .chevron { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; color: var(--slate); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), color 0.2s; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(180deg); color: var(--champagne); }

  /* ACCORDION */
  .card-body { overflow: hidden; max-height: 0; opacity: 0; margin-top: 0; transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, margin-top 0.3s ease; }
  .card.open .card-body { max-height: 700px; opacity: 1; margin-top: 14px; }
  .card-sep { height: 1px; background: var(--border); margin-bottom: 14px; }
  .dynamic-info { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .dyn-chip { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 5px; padding: 5px 10px; font-size: 11px; font-weight: 300; letter-spacing: 0.04em; color: #aaa9a5; }
  .chip-label { font-size: 8px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--slate); margin-right: 3px; }
  .items { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .item { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; font-weight: 300; letter-spacing: 0.04em; line-height: 1.55; color: #9a9690; }
  .item-icon { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; margin-top: 1px; }
  .content-opp { background: rgba(174,148,101,0.05); border: 1px solid rgba(174,148,101,0.13); border-radius: 6px; padding: 9px 13px; font-size: 11px; font-weight: 300; letter-spacing: 0.04em; color: #7a6a45; display: flex; gap: 9px; align-items: flex-start; margin-bottom: 12px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--slate); width: 74px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 2px; background: #222; border-radius: 100px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 100px; }
  .bar-pct { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; width: 32px; text-align: right; flex-shrink: 0; }

  /* FOOTER */
  .footer { margin-top: 44px; padding-top: 22px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; }
  .footer-logo img { height: 16px; filter: invert(1) brightness(0.82) sepia(0.45) saturate(2.2) hue-rotate(4deg) brightness(1.05); opacity: 0.65; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--slate); }
  .leg-dot { width: 6px; height: 6px; border-radius: 50%; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 720px) {
    .main { padding: 28px 18px 60px; }
    .summary-peek { display: none; }
    .header-logo img { height: 34px; }
  }
</style>
</head>

<script>
  const CHEVRON = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 5L7 9.5L11.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';


  function chip(icon, label, value) {
    if (!value) return '';
    return '<div class="dyn-chip"><span>' + icon + '</span><span class="chip-label">' + label + '</span>' + value + '</div>';
  }

  function bar(type, pct) {
    var fills = {
      work:     'linear-gradient(90deg,#AE9465,#E7D19D)',
      travel:   'linear-gradient(90deg,#30586E,#5a8ba8)',
      compete:  'linear-gradient(90deg,#8B3A2A,#C46A56)',
      personal: 'linear-gradient(90deg,#3D5C4A,#6B9478)'
    };
    var txtc = { work:'#E7D19D', travel:'#5a8ba8', compete:'#C46A56', personal:'#6B9478' };
    var lbl = type === 'compete' ? 'Competing' : type === 'personal' ? 'Off' : 'Productive';
    return '<div class="bar-row"><div class="bar-label">' + lbl + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + fills[type] + '"></div></div><div class="bar-pct" style="color:' + txtc[type] + '">' + pct + '%</div></div>';
  }

  var openCard = null;

  function toggleCard(id) {
    var el = document.getElementById(id);
    if (openCard && openCard !== el) openCard.classList.remove('open');
    el.classList.toggle('open');
    openCard = el.classList.contains('open') ? el : null;
  }

  function dayCard(o) {
    var id = 'c' + Math.random().toString(36).slice(2,9);
    var dynHtml = o.dynamic.filter(Boolean).join('');
    var itemsHtml = o.items.map(function(x){ return '<li class="item"><span class="item-icon">' + x[0] + '</span><span>' + x[1] + '</span></li>'; }).join('');
    var contentHtml = o.contentOpp ? '<div class="content-opp"><span>&#127909;</span><span>' + o.contentOpp + '</span></div>' : '';
    var html = '<div class="day-row">'
      + '<div class="timeline-col"><div class="t-dot dot-' + o.type + '"></div><div class="t-line"></div></div>'
      + '<div class="card type-' + o.type + '" id="' + id + '" onclick="toggleCard(\'' + id + '\')">'
      + '<div class="card-summary">'
      + '<div><div class="card-day-label">' + o.date + '</div><div class="card-title">' + o.title + '</div></div>'
      + '<div class="summary-right">'
      + '<div class="badge badge-' + o.badgeClass + '">' + o.badge + '</div>'
      + '<span class="summary-peek">' + (o.peek || '') + '</span>'
      + '<span class="chevron">' + CHEVRON + '</span>'
      + '</div></div>'
      + '<div class="card-body"><div class="card-sep"></div>'
      + (dynHtml ? '<div class="dynamic-info">' + dynHtml + '</div>' : '')
      + '<ul class="items">' + itemsHtml + '</ul>'
      + contentHtml
      + bar(o.type, o.barPct)
      + '</div></div></div>';
    return html;
  }

  function updateItinerary() {

    var days = [
      dayCard({
